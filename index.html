<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>С Днём Рождения, Ира!</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff6b9d;
  --purple: #c44dff;
  --yellow: #ffd93d;
  --cyan: #4dd9ff;
  --orange: #ff8c42;
  --green: #6bcb77;
  --bg: #120228;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  font-family: 'Manrope', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 900;
}

.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 1rem;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 15% 55%, #3a0060 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 20%, #002d66 0%, transparent 60%),
    radial-gradient(ellipse 70% 60% at 50% 90%, #5c0020 0%, transparent 60%),
    var(--bg);
}

.title-block {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 90vw;
}

.eyebrow {
  font-size: clamp(.7rem, 2vw, .9rem);
  font-weight: 800;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--cyan);
  opacity: 0;
  animation: rise-in .8s .1s ease forwards;
  margin-bottom: 0.5rem;
}

.main-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 7vw, 5rem);
  line-height: 1.2;
  background: linear-gradient(130deg, var(--yellow) 0%, var(--pink) 45%, var(--purple) 80%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  animation: rise-in .9s .3s ease forwards;
  text-transform: uppercase;
  letter-spacing: -0.01em;
}

.name-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(3.5rem, 14vw, 10rem);
  line-height: 1.1;
  background: linear-gradient(130deg, var(--pink), var(--yellow));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 10px 30px rgba(255,107,157,0.3));
  animation: rise-in .9s .5s ease both, glow-pulse 4s 1.5s ease-in-out infinite;
  text-transform: uppercase;
  letter-spacing: -0.03em;
  margin-top: 0.2rem;
}

.scroll-cue {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .4rem;
  opacity: 0;
  animation: rise-in .6s 1.4s ease forwards;
}

.scroll-cue span {
  font-size: .65rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
}

.chevron {
  width: 14px; height: 14px;
  border-right: 2px solid rgba(255,255,255,.2);
  border-bottom: 2px solid rgba(255,255,255,.2);
  transform: rotate(45deg);
  animation: bounce-y 2s ease-in-out infinite;
}

.pockets-section {
  padding: 4rem 1rem 6rem;
  background:
    radial-gradient(ellipse 100% 40% at 50% 0%, #1e0040 0%, transparent 80%),
    var(--bg);
}

.section-head {
  text-align: center;
  margin-bottom: 3rem;
}

.section-head h2 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: clamp(1.6rem, 5vw, 3rem);
  background: linear-gradient(130deg, var(--yellow), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
}

.pockets-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.2rem;
  max-width: 1120px;
  margin: 0 auto;
}

.pocket {
  perspective: 1500px;
  height: 230px;
  cursor: pointer;
  -webkit-perspective: 1500px;
}

.pocket-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  transition: transform .8s cubic-bezier(.34, 1.56, .64, 1);
}

.pocket.open .pocket-inner { 
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}

.pocket-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 1rem;
  overflow: hidden; /* Важно: скрываем всё, что может вылезать */
}

.pocket-front {
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 2;
  transform: translateZ(1px); /* Фикс для iOS */
}

/* При открытии скрываем контент лицевой стороны полностью */
.pocket.open .pocket-front * {
  visibility: hidden;
}

.pocket-symbol {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  margin-bottom: 1rem;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: transform .3s;
}

.pocket-label {
  font-size: .9rem;
  font-weight: 700;
  color: #fff;
  text-align: center;
}

.pocket-back {
  background: linear-gradient(135deg, var(--c1), var(--c2));
  transform: rotateY(180deg) translateZ(1px);
  -webkit-transform: rotateY(180deg) translateZ(1px);
  text-align: left;
  justify-content: flex-start;
  padding: 1.2rem;
  color: #fff;
}

.back-msg {
  font-size: .85rem;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: auto;
  overflow-y: auto;
}

.open-btn {
  width: 100%;
  padding: .6rem;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  color: #fff;
  font-weight: 700;
  font-size: .75rem;
  text-transform: uppercase;
  margin-top: 10px;
}

.fw-section {
  text-align: center;
  padding: 2rem 1rem 6rem;
}

.fw-btn {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  text-transform: uppercase;
  font-size: 1rem;
  padding: 1.2rem 2.5rem;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  border: none;
  border-radius: 50px;
  box-shadow: 0 10px 30px rgba(196,77,255,.4);
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  z-index: 2000;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.modal-overlay.hidden { display: none; }

.modal-box {
  background: #1c0638;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 24px;
  padding: 2rem 1.5rem;
  max-width: 450px;
  width: 100%;
  position: relative;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  text-align: center;
  margin-bottom: 1rem;
  color: var(--yellow);
}

.photo-drop {
  width: 100%;
  aspect-ratio: 4/3;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}

.photo-drop img {
  width: 100%; height: 100%;
  object-fit: cover;
}

@keyframes rise-in {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes glow-pulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(255,217,61,0.3)); }
  50% { filter: drop-shadow(0 0 40px rgba(255,107,157,0.5)); }
}

@keyframes bounce-y {
  0%,100% { transform: rotate(45deg) translate(0,0); }
  50% { transform: rotate(45deg) translate(4px,4px); }
}

/* RESPONSIVE FIXES */
@media (max-width: 1024px) {
  .pockets-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 768px) {
  .pockets-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
  .pocket { height: 210px; }
}

@media (max-width: 480px) {
  /* Одна колонка для удобного скролла вниз */
  .pockets-grid { grid-template-columns: 1fr; max-width: 320px; }
  .pocket { height: 200px; }
  .hero { padding-bottom: 4rem; }
  .main-title { letter-spacing: -0.01em; }
}
</style>
</head>

<body>

<canvas id="confetti-canvas"></canvas>

<section class="hero">
  <svg id="balloons-svg" xmlns="http://www.w3.org/2000/svg" style="position:absolute; inset:0; pointer-events:none;"></svg>
  <div class="title-block">
    <p class="eyebrow">Сегодня особенный день</p>
    <h1 class="main-title">С Днём Рождения,</h1>
    <h1 class="name-title">Ира!</h1>
  </div>
  <div class="scroll-cue">
    <span>Листай вниз</span>
    <div class="chevron"></div>
  </div>
</section>

<section class="pockets-section">
  <div class="section-head">
    <h2>Для тебя с любовью</h2>
    <p>Нажми на карточку, чтобы перевернуть её</p>
  </div>
  <div class="pockets-grid" id="pockets-grid"></div>
</section>

<section class="fw-section">
  <button class="fw-btn" onclick="launchFireworks()">Запустить фейерверк</button>
</section>

<div class="modal-overlay hidden" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-box">
    <button style="position:absolute; top:15px; right:15px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-photo" class="photo-drop"></div>
    <div id="modal-text" style="color:rgba(255,255,255,0.8); line-height:1.7; text-align:center;"></div>
    <div id="modal-music" style="margin-top:20px;"></div>
  </div>
</div>

<script>
const pockets = [
  {
    label: 'Королева стиля',
    c1: '#ff6b9d', c2: '#c44dff',
    msg: 'Ты не следуешь стилю — ты его задаёшь. В тебе есть вкус, уверенность и красота.',
    photoUrl: 'image1.jpg',
    musicUrl: 'song1.mp3',
    musicName: 'Песня для королевы'
  },
  {
    label: 'Вкус жизни',
    c1: '#ffd93d', c2: '#ff8c42',
    msg: 'Рядом с тобой всегда тепло, щедро и по-домашнему. Ты умеешь создавать уют.',
    photoUrl: 'image2.jpg'
  },
  {
    label: 'Армянское солнце',
    c1: '#ff8c42', c2: '#ff6b9d',
    msg: 'В тебе есть южное тепло, характер и особенная душа. Это чувствуется сразу.',
    photoUrl: 'image3.jpg'
  },
  {
    label: 'Королева дороги',
    c1: '#4dd9ff', c2: '#c44dff',
    msg: 'Ты за рулём — это уверенность и стиль. Пусть все дороги ведут к счастью.',
    photoUrl: 'image4.jpg'
  },
  {
    label: 'Душа компании',
    c1: '#6bcb77', c2: '#4dd9ff',
    msg: 'Ты умеешь поддерживать, смешить и создавать настроение. С тобой обычный день становится праздником.',
    photoUrl: 'image5.jpg',
    musicUrl: 'song2.mp3',
    musicName: 'Праздничное настроение'
  },
  {
    label: 'Письмо для тебя',
    c1: '#c44dff', c2: '#ff6b9d',
    msg: 'Ира, пусть в жизни будет много красивых поводов и радости без причины.'
  },
  {
    label: 'Модница',
    c1: '#f472b6', c2: '#a855f7',
    msg: 'Ты превращаешь любой образ в настроение. Оставайся такой же яркой!',
    photoUrl: 'image6.jpg'
  },
  {
    label: 'Самое главное',
    c1: '#ffd93d', c2: '#ff6b9d',
    msg: 'Спасибо за твою красоту и заботу. Ты делаешь этот мир лучше. С днём рождения!'
  }
];

const grid = document.getElementById('pockets-grid');

pockets.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'pocket';
  el.style.setProperty('--c1', p.c1);
  el.style.setProperty('--c2', p.c2);
  el.innerHTML = `
    <div class="pocket-inner">
      <div class="pocket-face pocket-front">
        <div class="pocket-symbol"></div>
        <div class="pocket-label">${p.label}</div>
      </div>
      <div class="pocket-face pocket-back">
        <div class="back-msg">${p.msg}</div>
        <button class="open-btn" onclick="openModal(${i}); event.stopPropagation();">Подробнее</button>
      </div>
    </div>`;
  el.onclick = () => el.classList.toggle('open');
  grid.appendChild(el);
});

const audioStore = {};
let activeAudio = null;

function openModal(i) {
  const p = pockets[i];
  document.getElementById('modal-title').textContent = p.label;
  document.getElementById('modal-text').textContent = p.msg;
  
  const photoCont = document.getElementById('modal-photo');
  if (p.photoUrl) {
    photoCont.style.display = 'block';
    photoCont.innerHTML = `<img src="${p.photoUrl}" onerror="this.parentElement.style.display='none'">`;
  } else {
    photoCont.style.display = 'none';
  }

  const musicCont = document.getElementById('modal-music');
  if (p.musicUrl) {
    musicCont.innerHTML = `
      <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; display:flex; align-items:center; gap:15px;">
        <button id="pbtn-${i}" onclick="toggleMusic('${p.musicUrl}', ${i})" style="width:40px; height:40px; border-radius:50%; border:none; background:var(--pink); color:#fff; cursor:pointer;">▶</button>
        <span style="color:#fff; font-size:0.8rem;">${p.musicName}</span>
      </div>`;
  } else {
    musicCont.innerHTML = '';
  }

  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
  if (activeAudio) {
    activeAudio.pause();
    activeAudio = null;
  }
}

function toggleMusic(src, i) {
  if (!audioStore[i]) audioStore[i] = new Audio(src);
  const audio = audioStore[i];
  const btn = document.getElementById(`pbtn-${i}`);

  if (activeAudio && activeAudio !== audio) {
    activeAudio.pause();
  }

  if (audio.paused) {
    audio.play();
    btn.textContent = '⏸';
    activeAudio = audio;
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
}

/* CONFETTI & FIREWORKS */
const CC = document.getElementById('confetti-canvas');
const cc = CC.getContext('2d');
let pieces = [];
const COLS = ['#ff6b9d','#c44dff','#ffd93d','#4dd9ff','#ff8c42','#fff'];

function resize() { CC.width = window.innerWidth; CC.height = window.innerHeight; }
window.onresize = resize; resize();

function mkP(x, y, b) {
  return {
    x: x ?? Math.random()*CC.width, y: y ?? -20,
    r: Math.random()*4+4, col: COLS[Math.random()*COLS.length|0],
    vx: b ? (Math.random()-.5)*15 : (Math.random()-.5)*2,
    vy: b ? (Math.random()-.5)*15-2 : Math.random()*3+2,
    op: 1, g: 0.15, rot: Math.random()*10, b
  };
}

function launchFireworks() {
  for(let i=0; i<5; i++) {
    setTimeout(() => {
      const x = Math.random()*CC.width;
      const y = Math.random()*CC.height*0.6;
      for(let j=0; j<50; j++) pieces.push(mkP(x, y, true));
    }, i*300);
  }
}

(function anim() {
  cc.clearRect(0,0,CC.width,CC.height);
  pieces = pieces.filter(p => p.op > 0.01);
  pieces.forEach(p => {
    p.vy += p.g; p.x += p.vx; p.y += p.vy;
    if(p.b) p.op -= 0.015;
    cc.fillStyle = p.col; cc.globalAlpha = p.op;
    cc.beginPath(); cc.arc(p.x, p.y, p.r/2, 0, 7); cc.fill();
  });
  if(pieces.length < 100 && Math.random() < 0.3) pieces.push(mkP());
  requestAnimationFrame(anim);
})();

/* BALLOONS */
const bSvg = document.getElementById('balloons-svg');
for(let i=0; i<10; i++) {
  const e = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  const x = Math.random()*100;
  const s = 15 + Math.random()*15;
  const d = Math.random()*10;
  e.setAttribute('cx', x+'%'); e.setAttribute('cy', '110%');
  e.setAttribute('rx', '30'); e.setAttribute('ry', '40');
  e.setAttribute('fill', COLS[i%COLS.length]);
  e.style.opacity = '0.4';
  e.innerHTML = `<animateTransform attributeName="transform" type="translate" from="0 0" to="0 -1200" dur="${s}s" begin="${d}s" repeatCount="indefinite" />`;
  bSvg.appendChild(e);
}
</script>
</body>
</html>
